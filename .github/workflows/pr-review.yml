name: AI Code Review

# PR마다 멀티 AI 패널(Codex + Kiro x3)이 리뷰하고 Claude Opus 4.8 의장이
# 종합해 코멘트로 게시(fail-closed VERDICT). 공유 actions-runner-claude 이미지 사용.
# (kiro-cli 는 headless chat 에서 STDIN 을 안 읽음 → diff 파일 경로를 프롬프트로 주고 자기 신뢰 도구로
#  읽게 전달; 대형 diff 를 argv 에 직접 넣으면 커널 argv 길이 한도에 걸림 — run-panel.sh 참조)
#   - pull_request_target base-ref 체크아웃(M1): PR head 코드 미실행, diff 는 데이터로만
#   - 인증: EKS Pod Identity(ci-runner) SigV4 + ai-panel-keys(KIRO/ANTIGRAVITY)
#   - 리전: us-east-1 (Claude us. geo / codex gpt-5.5 bedrock-mantle In-Region)

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  review:
    name: AI Code Review
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: awsops-claude-arm
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      contents: read
    env:
      # us-east-1 통일: Claude us. geo(on-demand) + codex gpt-5.5 mantle(In-Region).
      ANTHROPIC_MODEL: us.anthropic.claude-opus-4-8
      CLAUDE_CODE_USE_BEDROCK: 1
      ANTHROPIC_BEDROCK_BASE_URL: https://bedrock-runtime.us-east-1.amazonaws.com
      AWS_REGION: us-east-1
    steps:
      # 보안(M1): pull_request_target 는 시크릿/쓰기권한 컨텍스트 → base(신뢰됨) 체크아웃.
      # base.ref tip 을 명시 체크아웃 → 패널/의장이 diff 가 얹히는 BASE 파일(스택드 PR 의 base
      # 심볼·컬럼·import, migrations/*.sql)을 읽어 "없음" 오탐을 피한다. PR head 는 미체크아웃(코드 미실행).
      - uses: actions/checkout@v4
        with:
          # Pin to the immutable base SHA (not base.ref branch tip): deterministic base context, and
          # no window where a moved/unprotected base injects unreviewed code into this trusted job.
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Verify CLIs present (runner image)
        run: |
          command -v claude >/dev/null 2>&1 || { echo "::warning::claude not found"; npm install -g @anthropic-ai/claude-code; }
          claude --version
          for c in codex kiro-cli; do
            command -v "$c" >/dev/null 2>&1 || echo "::warning::$c not found on runner (image needs rebuild)"
          done

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr diff "$PR_NUMBER" > /tmp/pr-diff-raw.txt
          awk '
            /^diff --git/ {
              path = substr($3, 3)
              skip = (path ~ /(^|\/)package-lock\.json$/) ||
                     (path ~ /(^|\/)pnpm-lock\.yaml$/) ||
                     (path ~ /(^|\/)yarn\.lock$/) ||
                     (path ~ /(^|\/)node_modules\//) ||
                     (path ~ /\.(pptx|png|jpg|jpeg|gif|pdf|vsix|zip)$/) ||
                     (path ~ /(^|\/)(dist|out|build)\//) ||
                     (path ~ /\.terraform\.lock\.hcl$/)
            }
            !skip
          ' /tmp/pr-diff-raw.txt > /tmp/pr-diff.txt
          echo "total_lines=$(wc -l < /tmp/pr-diff.txt)" >> "$GITHUB_ENV"

      - name: Build panel prompt
        run: |
          set -euo pipefail
          MAX_LINES=3000
          head -"$MAX_LINES" /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt
          cat <<'PROMPT_EOF' > /tmp/panel-prompt.txt
          Review the code diff for bugs, security risks, logic errors, and convention violations
          (read CLAUDE.md / AGENTS.md for this repo's conventions). The diff is delivered either
          via stdin or as a file path mentioned later in this prompt — if a file path is given,
          read that file with your file-read tool before reviewing.

          BASE CONTEXT (critical — avoids false "missing X" findings): the repository BASE branch is
          checked out in your current working directory and you CAN read files (read/grep tools). The
          diff is a PATCH applied ON TOP of this base — it may be a STACKED PR whose base already
          contains the imports, helpers, DB columns, IAM statements, or migrations the diff relies on.
          Before reporting that ANY symbol / import / function / DB column / IAM permission / migration
          is missing or undefined, OPEN the relevant base file(s) and confirm. Do NOT flag a missing
          definition you have not verified by reading the base.
          DB SCHEMA: the live schema = the frozen baseline `terraform/v2/foundation/data/schema.sql`
          PLUS every `terraform/v2/foundation/migrations/*.sql` (applied by `make migrate` before
          deploy). A column / CHECK / table absent from schema.sql is NOT missing if a migration under
          migrations/ adds it — grep migrations/ before flagging any schema gap.

          Output concise findings grouped CRITICAL/MAJOR/MINOR.
          DO NOT output a VERDICT line — that is the chair's job.
          한국어+영문 기술용어 혼용 가능.
          PROMPT_EOF
          if [ "${total_lines:-0}" -gt "$MAX_LINES" ]; then
            echo "WARNING: diff was ${total_lines} lines; only the first ${MAX_LINES} were reviewed." >> /tmp/panel-prompt.txt
            echo "panel_truncated=1" >> "$GITHUB_ENV"
          fi

      - name: Run panel + synthesize
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PANEL_TIMEOUT: "300"
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr-review
          bash scripts/pr-review/run-panel.sh /tmp/pr-diff-truncated.txt /tmp/panel-prompt.txt /tmp/pr-review
          bash scripts/pr-review/synthesize.sh /tmp/pr-diff-truncated.txt /tmp/pr-review \
            "$PR_NUMBER" "$PR_TITLE" /tmp/review.md
          echo "panel_responded=$(tr '\n' ' ' < /tmp/pr-review/responded.txt 2>/dev/null)" >> "$GITHUB_ENV"

      - name: Check for blocking issues
        id: gate
        run: |
          if grep -q "^VERDICT: FAIL$" /tmp/review.md; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          elif grep -q "^VERDICT: PASS$" /tmp/review.md; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment (upsert)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GATE_RESULT: ${{ steps.gate.outputs.result }}
        run: |
          MARKER="<!-- multi-ai-pr-review -->"
          if [ "$GATE_RESULT" = "fail" ]; then
            STATUS_BADGE="**Status: BLOCKED** — CRITICAL/MAJOR issues must be resolved before merge"
          else
            STATUS_BADGE="**Status: PASSED** — No blocking issues found"
          fi
          sed '$ { /^VERDICT:/d }' /tmp/review.md > /tmp/review-clean.md
          {
            echo "$MARKER"
            echo "## 🤖 AI Code Review (Claude Opus 4.8 chair · Codex + Kiro panel)"
            echo ""
            echo "_Panel: Claude(chair) · ${panel_responded:-solo}_"
            [ "${panel_truncated:-0}" = "1" ] && echo "_⚠️ diff truncated to first 3000 lines — review is partial._"
            echo ""
            echo "$STATUS_BADGE"
            echo ""
            cat /tmp/review-clean.md
            echo ""
            echo "---"
            echo "_Triggered by commit \`${{ github.event.pull_request.head.sha }}\` · workflow: \`.github/workflows/pr-review.yml\`_"
          } > /tmp/comment.md
          EXISTING=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- multi-ai-pr-review -->")) | .id' 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/$REPO/issues/comments/$EXISTING" -X PATCH -f body="$(cat /tmp/comment.md)" 2>/dev/null || \
              gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
          fi

      - name: Fail if CRITICAL or MAJOR
        if: steps.gate.outputs.result == 'fail'
        run: |
          echo "AI Review failed"
          exit 1
