AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWSops cross-account read-only role. Deploy this in each TARGET account you want AWSops to read
  (cost, Bedrock metrics, inventory, etc.). The host AWSops web task role assumes this role via STS
  with an ExternalId (confused-deputy guard). Read-only only (ReadOnlyAccess) — AWSops never mutates
  target-account resources.

Parameters:
  HostTaskRoleArn:
    Type: String
    Description: ARN of the AWSops host web ECS task role (the ONLY principal allowed to assume this role).
    AllowedPattern: '^arn:aws:iam::\d{12}:role/.+$'
  ExternalId:
    Type: String
    Description: Shared ExternalId (confused-deputy guard). Use the same value you register in AWSops /accounts.
    MinLength: 8
    NoEcho: true
  RoleName:
    Type: String
    Default: AWSopsReadOnlyRole
    Description: Role name AWSops expects (keep the default unless you override role_name in /accounts).

Resources:
  AWSopsReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: AWSops cross-account read-only access (assumed by the host web task role).
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              # ONLY the host web task role — NOT the host account root (least privilege).
              AWS: !Ref HostTaskRoleArn
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

Outputs:
  RoleArn:
    Description: Register this account in AWSops /accounts (the role name must match).
    Value: !GetAtt AWSopsReadOnlyRole.Arn
