name: Deploy Guide to GitHub Pages

# NOTE: upstream (whchoi98/awsops) lacks the fork's self-hosted runner
# 'awsops-claude-arm', so a bring-up commit (20abf6cd) dropped this to
# workflow_dispatch-only "for upstream" — but that landed on THIS fork's main
# via the routine upstream-sync merge too, silently disabling auto-deploy on
# every docs-site push since 2026-07-20. The runner is alive here (EKS Pod
# Identity + Bedrock us-east-1 on mall-apne2-mgmt), so restore the real trigger.
on:
  push:
    branches: [main]
    paths: ['docs-site/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: awsops-claude-arm
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SITE_URL: ${{ vars.SITE_URL || 'https://www.atomai.click' }}
          BASE_URL: ${{ vars.BASE_URL || '/awsops/' }}

      # Canary: fail loudly if the customer overview page is missing from the
      # build, so we never silently deploy an incomplete docs site again.
      - name: Verify build completeness
        run: |
          test -f build/sitemap.xml || { echo "::error::sitemap.xml missing"; exit 1; }
          if ! grep -q "overview/why-awsops" build/sitemap.xml; then
            echo "::error::overview/why-awsops missing from sitemap — build is incomplete"
            exit 1
          fi
          echo "Build verified: overview/why-awsops present in sitemap."

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: awsops-claude-arm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
