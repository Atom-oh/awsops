<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>AWSops v2 — Compliance benchmark execution flow (read-only Powerpipe)</title>

  <!-- palette matches docs-site/.../common/theme.css .theme-dark, same tokens as security-findings-pipeline.svg -->

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7194"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ba1b8"/>
    </marker>

    <symbol id="icon-lock" viewBox="0 0 24 24">
      <path d="M7 10 V7 a5 5 0 0 1 10 0 v3" fill="none" stroke="currentColor" stroke-width="2"/>
      <rect x="5" y="10" width="14" height="11" rx="2" fill="currentColor"/>
    </symbol>
    <symbol id="icon-queue" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="4.5" rx="1.5" fill="currentColor"/>
      <rect x="3" y="10" width="18" height="4.5" rx="1.5" fill="currentColor" opacity=".7"/>
      <rect x="3" y="16" width="18" height="4.5" rx="1.5" fill="currentColor" opacity=".45"/>
    </symbol>
    <symbol id="icon-sfn" viewBox="0 0 24 24">
      <circle cx="4" cy="12" r="3" fill="currentColor"/>
      <circle cx="12" cy="5" r="3" fill="currentColor"/>
      <circle cx="12" cy="19" r="3" fill="currentColor"/>
      <circle cx="20" cy="12" r="3" fill="currentColor"/>
      <path d="M6.5 10.5 L9.7 7 M6.5 13.5 L9.7 17 M14.3 7 L17.5 10.5 M14.3 17 L17.5 13.5" stroke="currentColor" stroke-width="1.6" fill="none"/>
    </symbol>
    <symbol id="icon-container" viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
      <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/>
      <line x1="8" y1="5" x2="8" y2="10" stroke="currentColor" stroke-width="1.6"/>
      <line x1="13" y1="5" x2="13" y2="10" stroke="currentColor" stroke-width="1.6"/>
      <line x1="18" y1="5" x2="18" y2="10" stroke="currentColor" stroke-width="1.6"/>
    </symbol>
    <symbol id="icon-sparkline" viewBox="0 0 24 24">
      <polyline points="2,18 7,12 11,15 16,6 22,9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-bars" viewBox="0 0 24 24">
      <rect x="3" y="12" width="4" height="9" fill="currentColor"/>
      <rect x="10" y="6" width="4" height="15" fill="currentColor"/>
      <rect x="17" y="2" width="4" height="19" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- background card -->
  <rect x="1" y="1" width="1198" height="598" rx="14" fill="#0f1117" stroke="#2d3250" stroke-width="2"/>

  <!-- title -->
  <text x="28" y="34" fill="#e8eaf0" font-size="22" font-weight="700">Compliance Benchmark Execution Flow</text>
  <text x="28" y="52" fill="#9ba1b8" font-size="12.5">CIS AWS Foundations Benchmark, run via Powerpipe against synced inventory — not a live scan</text>

  <!-- read-only badge -->
  <rect x="900" y="16" width="280" height="34" rx="17" fill="rgba(0,184,148,.15)" stroke="#00b894" stroke-width="1.5"/>
  <use href="#icon-lock" x="912" y="21" width="22" height="22" color="#00b894"/>
  <text x="940" y="38" fill="#00b894" font-size="12.5" font-weight="700">READ-ONLY — no remediation (ADR-005/007)</text>

  <!-- ================= 1. Triggers ================= -->
  <rect x="20" y="200" width="160" height="70" rx="10" fill="#1a1d2e" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="100" y="228" fill="#e8eaf0" font-size="12.5" font-weight="700" text-anchor="middle">"Run Benchmark"</text>
  <text x="100" y="244" fill="#9ba1b8" font-size="10.5" text-anchor="middle">web BFF button</text>
  <text x="100" y="258" fill="#6b7194" font-size="9.5" text-anchor="middle">on-demand</text>

  <rect x="20" y="400" width="160" height="70" rx="10" fill="#1a1d2e" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="100" y="428" fill="#e8eaf0" font-size="12.5" font-weight="700" text-anchor="middle">Scheduled Job</text>
  <text x="100" y="444" fill="#9ba1b8" font-size="10.5" text-anchor="middle">EventBridge cron</text>
  <text x="100" y="458" fill="#6b7194" font-size="9.5" text-anchor="middle">recurring</text>

  <path id="p-t1" d="M180,235 H220 V300 H258" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-t2" d="M180,435 H220 V300 H258" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4.5" fill="#a29bfe"><animateMotion dur="2.2s" begin="0s" repeatCount="indefinite"><mpath href="#p-t1"/></animateMotion></circle>
  <circle r="4.5" fill="#a29bfe"><animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite"><mpath href="#p-t2"/></animateMotion></circle>

  <!-- ================= 2. SQS -> Step Functions ================= -->
  <rect x="260" y="265" width="90" height="70" rx="10" fill="#1a1d2e" stroke="#fdcb6e" stroke-width="1.5"/>
  <use href="#icon-queue" x="294" y="278" width="22" height="22" color="#fdcb6e"/>
  <text x="305" y="322" fill="#9ba1b8" font-size="10.5" text-anchor="middle">SQS</text>

  <path id="p-sqs-sfn" d="M350,300 H388" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4" fill="#fdcb6e"><animateMotion dur="1.4s" begin="0s" repeatCount="indefinite"><mpath href="#p-sqs-sfn"/></animateMotion></circle>

  <rect x="390" y="265" width="110" height="70" rx="10" fill="#1a1d2e" stroke="#fdcb6e" stroke-width="1.5"/>
  <use href="#icon-sfn" x="434" y="277" width="22" height="22" color="#fdcb6e"/>
  <text x="445" y="322" fill="#9ba1b8" font-size="10" text-anchor="middle">Step Functions</text>

  <path id="p-sfn-fg" d="M500,300 H548" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4" fill="#fdcb6e"><animateMotion dur="1.4s" begin="0.4s" repeatCount="indefinite"><mpath href="#p-sfn-fg"/></animateMotion></circle>

  <!-- ================= 3. Powerpipe on warm Steampipe Fargate ================= -->
  <rect x="550" y="240" width="190" height="120" rx="10" fill="#1a1d2e" stroke="#00b894" stroke-width="1.5"/>
  <circle cx="580" cy="270" r="15" fill="rgba(0,184,148,.18)">
    <animate attributeName="r" values="14;17;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".8;.35;.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <use href="#icon-container" x="569" y="259" width="22" height="22" color="#00b894"/>
  <text x="645" y="285" fill="#e8eaf0" font-size="13" font-weight="700" text-anchor="middle">Powerpipe</text>
  <text x="645" y="302" fill="#9ba1b8" font-size="10.5" text-anchor="middle">on warm Steampipe Fargate task</text>
  <text x="645" y="318" fill="#6b7194" font-size="9.5" text-anchor="middle">CIS AWS v3.0.0 / v4.0.0 controls</text>
  <text x="645" y="332" fill="#6b7194" font-size="9.5" text-anchor="middle">queries Steampipe FDW, not live AWS calls</text>

  <path id="p-fg-db" d="M740,300 H798" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4.5" fill="#00b894"><animateMotion dur="1.5s" begin="0s" repeatCount="indefinite"><mpath href="#p-fg-db"/></animateMotion></circle>

  <!-- ================= 4. Aurora result tables ================= -->
  <g>
    <path d="M800,235 a55,13 0 1 0 110,0 a55,13 0 1 0 -110,0" fill="#232740" stroke="#a29bfe" stroke-width="1.5"/>
    <rect x="800" y="235" width="110" height="45" fill="#232740" stroke="none"/>
    <line x1="800" y1="235" x2="800" y2="280" stroke="#a29bfe" stroke-width="1.5"/>
    <line x1="910" y1="235" x2="910" y2="280" stroke="#a29bfe" stroke-width="1.5"/>
    <path d="M800,280 a55,13 0 0 0 110,0" fill="#232740" stroke="#a29bfe" stroke-width="1.5"/>
    <text x="855" y="262" fill="#e8eaf0" font-size="11" font-weight="700" text-anchor="middle">compliance_runs</text>
  </g>
  <g>
    <path d="M800,320 a55,13 0 1 0 110,0 a55,13 0 1 0 -110,0" fill="#232740" stroke="#a29bfe" stroke-width="1.5"/>
    <rect x="800" y="320" width="110" height="45" fill="#232740" stroke="none"/>
    <line x1="800" y1="320" x2="800" y2="365" stroke="#a29bfe" stroke-width="1.5"/>
    <line x1="910" y1="320" x2="910" y2="365" stroke="#a29bfe" stroke-width="1.5"/>
    <path d="M800,365 a55,13 0 0 0 110,0" fill="#232740" stroke="#a29bfe" stroke-width="1.5"/>
    <text x="855" y="347" fill="#e8eaf0" font-size="11" font-weight="700" text-anchor="middle">compliance_results</text>
  </g>
  <text x="855" y="393" fill="#6b7194" font-size="10" font-style="italic" text-anchor="middle">history, per-account scoped</text>

  <!-- tables -> dashboard -->
  <path id="p-db1" d="M910,257 H960 V300 H978" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-db2" d="M910,342 H960 V300 H978" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4.5" fill="#a29bfe"><animateMotion dur="1.6s" begin="0.2s" repeatCount="indefinite"><mpath href="#p-db1"/></animateMotion></circle>
  <circle r="4.5" fill="#a29bfe"><animateMotion dur="1.6s" begin="0.6s" repeatCount="indefinite"><mpath href="#p-db2"/></animateMotion></circle>

  <!-- ================= 5. Compliance dashboard ================= -->
  <rect x="980" y="220" width="195" height="220" rx="10" fill="#1a1d2e" stroke="#e8eaf0" stroke-width="1.2"/>
  <text x="1077" y="246" fill="#e8eaf0" font-size="13" font-weight="700" text-anchor="middle">Compliance Dashboard</text>

  <rect x="1000" y="262" width="155" height="78" rx="8" fill="#0f1117" stroke="#2d3250" stroke-width="1"/>
  <use href="#icon-sparkline" x="1010" y="272" width="20" height="20" color="#74b9ff">
    <animate attributeName="opacity" values="1;.5;1" dur="2.4s" repeatCount="indefinite"/>
  </use>
  <text x="1040" y="286" fill="#9ba1b8" font-size="10.5">Pass-rate over time</text>
  <polyline points="1010,325 1030,308 1050,318 1075,296 1100,304 1130,290 1150,300" fill="none" stroke="#74b9ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle r="3.5" fill="#74b9ff"><animateMotion dur="2.6s" repeatCount="indefinite" path="M1010,325 L1030,308 L1050,318 L1075,296 L1100,304 L1130,290 L1150,300"/></circle>

  <rect x="1000" y="352" width="155" height="78" rx="8" fill="#0f1117" stroke="#2d3250" stroke-width="1"/>
  <use href="#icon-bars" x="1010" y="362" width="20" height="20" color="#fdcb6e"/>
  <text x="1040" y="376" fill="#9ba1b8" font-size="10.5">Per-control breakdown</text>
  <rect x="1012" y="405" width="12" height="16" fill="#00b894"/>
  <rect x="1032" y="392" width="12" height="29" fill="#00b894"/>
  <rect x="1052" y="410" width="12" height="11" fill="#fdcb6e"/>
  <rect x="1072" y="398" width="12" height="23" fill="#00b894"/>
  <rect x="1092" y="414" width="12" height="7" fill="#e17055"/>
  <rect x="1112" y="404" width="12" height="17" fill="#00b894"/>
  <rect x="1132" y="408" width="12" height="13" fill="#fdcb6e"/>

</svg>
