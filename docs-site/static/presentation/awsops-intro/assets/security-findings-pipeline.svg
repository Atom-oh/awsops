<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>AWSops v2 — Security findings pipeline (read-only)</title>

  <!-- ============ palette (matches docs-site/.../common/theme.css .theme-dark) ============
       bg-primary #0f1117  surface-2 #1a1d2e  surface-3 #232740  border #2d3250
       text-primary #e8eaf0  text-secondary #9ba1b8  text-muted #6b7194
       accent(purple) #a29bfe  info(blue) #74b9ff  success(green) #00b894
       warning(yellow) #fdcb6e  danger(red) #e17055
  -->

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7194"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ba1b8"/>
    </marker>

    <symbol id="icon-lock" viewBox="0 0 24 24">
      <path d="M7 10 V7 a5 5 0 0 1 10 0 v3" fill="none" stroke="currentColor" stroke-width="2"/>
      <rect x="5" y="10" width="14" height="11" rx="2" fill="currentColor"/>
    </symbol>
    <symbol id="icon-account" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4" fill="currentColor"/>
      <path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7" fill="currentColor"/>
    </symbol>
    <symbol id="icon-code" viewBox="0 0 24 24">
      <path d="M9 4 L3 12 L9 20 M15 4 L21 12 L15 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- background card -->
  <rect x="1" y="1" width="1198" height="598" rx="14" fill="#0f1117" stroke="#2d3250" stroke-width="2"/>

  <!-- title -->
  <text x="28" y="34" fill="#e8eaf0" font-size="22" font-weight="700">Security Findings Pipeline</text>
  <text x="28" y="52" fill="#9ba1b8" font-size="12.5">Derived entirely from a synced inventory table — no live scanning, no target-account writes</text>

  <!-- read-only badge -->
  <rect x="955" y="16" width="225" height="34" rx="17" fill="rgba(0,184,148,.15)" stroke="#00b894" stroke-width="1.5"/>
  <use href="#icon-lock" x="967" y="21" width="22" height="22" color="#00b894"/>
  <text x="995" y="38" fill="#00b894" font-size="12.5" font-weight="700">READ-ONLY · no mutation</text>

  <!-- ================= 1. Accounts ================= -->
  <g>
    <rect x="20" y="60" width="150" height="70" rx="10" fill="#1a1d2e" stroke="#74b9ff" stroke-width="1.5"/>
    <use href="#icon-account" x="32" y="72" width="22" height="22" color="#74b9ff"/>
    <text x="60" y="90" fill="#e8eaf0" font-size="13" font-weight="700">Host Account</text>
    <text x="32" y="112" fill="#6b7194" font-size="10.5">180294183052</text>

    <rect x="20" y="265" width="150" height="70" rx="10" fill="#1a1d2e" stroke="#74b9ff" stroke-width="1.5"/>
    <use href="#icon-account" x="32" y="277" width="22" height="22" color="#74b9ff"/>
    <text x="60" y="295" fill="#e8eaf0" font-size="13" font-weight="700">Target Account 1</text>
    <text x="32" y="317" fill="#6b7194" font-size="10.5">cross-account, read-only</text>

    <rect x="20" y="470" width="150" height="70" rx="10" fill="#1a1d2e" stroke="#74b9ff" stroke-width="1.5"/>
    <use href="#icon-account" x="32" y="482" width="22" height="22" color="#74b9ff"/>
    <text x="60" y="500" fill="#e8eaf0" font-size="13" font-weight="700">Target Account N</text>
    <text x="32" y="522" fill="#6b7194" font-size="10.5">cross-account, read-only</text>

    <text x="95" y="558" fill="#6b7194" font-size="11" font-style="italic" text-anchor="middle">Host + N target accounts</text>
  </g>

  <!-- fan paths accounts -> STS -->
  <path id="p-a1" d="M170,95 H205 V300 H228" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-a2" d="M170,300 H228" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-a3" d="M170,505 H205 V300 H228" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4.5" fill="#74b9ff"><animateMotion dur="2.4s" begin="0s" repeatCount="indefinite"><mpath href="#p-a1"/></animateMotion></circle>
  <circle r="4.5" fill="#74b9ff"><animateMotion dur="2.4s" begin="0.4s" repeatCount="indefinite"><mpath href="#p-a2"/></animateMotion></circle>
  <circle r="4.5" fill="#74b9ff"><animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite"><mpath href="#p-a3"/></animateMotion></circle>

  <!-- ================= 2. STS AssumeRole ================= -->
  <rect x="230" y="250" width="160" height="100" rx="10" fill="#1a1d2e" stroke="#00b894" stroke-width="1.5"/>
  <circle cx="255" cy="278" r="15" fill="rgba(0,184,148,.18)">
    <animate attributeName="r" values="14;17;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".8;.35;.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <use href="#icon-lock" x="244" y="267" width="22" height="22" color="#00b894"/>
  <text x="310" y="300" fill="#e8eaf0" font-size="13.5" font-weight="700" text-anchor="middle">STS AssumeRole</text>
  <text x="310" y="317" fill="#9ba1b8" font-size="11" text-anchor="middle">read-only fan-out</text>
  <text x="310" y="332" fill="#6b7194" font-size="10" text-anchor="middle">per ADR-011</text>

  <path id="p-sts-db" d="M390,300 H458" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4.5" fill="#74b9ff"><animateMotion dur="1.5s" begin="0s" repeatCount="indefinite"><mpath href="#p-sts-db"/></animateMotion></circle>
  <text x="424" y="288" fill="#6b7194" font-size="9.5" text-anchor="middle">SELECT-only</text>

  <!-- ================= 3. Aurora inventory_resources ================= -->
  <g>
    <path d="M460,265 a60,15 0 1 0 120,0 a60,15 0 1 0 -120,0" fill="#232740" stroke="#a29bfe" stroke-width="1.5"/>
    <rect x="460" y="265" width="120" height="70" fill="#232740" stroke="none"/>
    <line x1="460" y1="265" x2="460" y2="335" stroke="#a29bfe" stroke-width="1.5"/>
    <line x1="580" y1="265" x2="580" y2="335" stroke="#a29bfe" stroke-width="1.5"/>
    <path d="M460,335 a60,15 0 0 0 120,0" fill="#232740" stroke="#a29bfe" stroke-width="1.5"/>
    <circle cx="520" cy="300" r="66" fill="none" stroke="#a29bfe" stroke-width="1">
      <animate attributeName="opacity" values=".5;.05;.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="520" y="303" fill="#e8eaf0" font-size="12" font-weight="700" text-anchor="middle">inventory_resources</text>
  </g>
  <text x="520" y="365" fill="#6b7194" font-size="10.5" font-style="italic" text-anchor="middle">Aurora · populated by flag-gated Steampipe sync</text>
  <text x="520" y="380" fill="#6b7194" font-size="10.5" font-style="italic" text-anchor="middle">(steampipe_enabled — separate from this pipeline)</text>

  <path id="p-db-bff" d="M580,300 H648" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <circle r="4.5" fill="#74b9ff"><animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite"><mpath href="#p-db-bff"/></animateMotion></circle>

  <!-- ================= 4. BFF derivation ================= -->
  <rect x="650" y="250" width="180" height="100" rx="10" fill="#1a1d2e" stroke="#e8eaf0" stroke-width="1.2"/>
  <use href="#icon-code" x="662" y="266" width="22" height="22" color="#e8eaf0"/>
  <text x="740" y="300" fill="#e8eaf0" font-size="13.5" font-weight="700" text-anchor="middle">Next.js thin-BFF</text>
  <text x="740" y="318" fill="#9ba1b8" font-size="11" text-anchor="middle">derives findings</text>
  <text x="740" y="333" fill="#6b7194" font-size="10" text-anchor="middle">(query only, no writes)</text>

  <!-- ECR SDK sync — separate secondary path -->
  <rect x="650" y="490" width="180" height="60" rx="10" fill="#1a1d2e" stroke="#6b7194" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="740" y="514" fill="#9ba1b8" font-size="12" font-weight="700" text-anchor="middle">ECR SDK Sync</text>
  <text x="740" y="530" fill="#6b7194" font-size="10" text-anchor="middle">separate path (DescribeImages)</text>

  <!-- fan-out BFF -> 4 categories -->
  <path id="p-c1" d="M830,300 H865 V70 H898" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-c2" d="M830,300 H865 V185 H898" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-c3" d="M830,300 H898" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-c4" d="M830,300 H865 V415 H898" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-c5" d="M830,520 H865 V530 H898" fill="none" stroke="#6b7194" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>

  <circle r="4.5" fill="#74b9ff"><animateMotion dur="2s" begin="0s" repeatCount="indefinite"><mpath href="#p-c1"/></animateMotion></circle>
  <circle r="4.5" fill="#fdcb6e"><animateMotion dur="2s" begin="0.3s" repeatCount="indefinite"><mpath href="#p-c2"/></animateMotion></circle>
  <circle r="4.5" fill="#a29bfe"><animateMotion dur="2s" begin="0.6s" repeatCount="indefinite"><mpath href="#p-c3"/></animateMotion></circle>
  <circle r="4.5" fill="#e17055"><animateMotion dur="2s" begin="0.9s" repeatCount="indefinite"><mpath href="#p-c4"/></animateMotion></circle>
  <circle r="4" fill="#9ba1b8"><animateMotion dur="2.2s" begin="0.2s" repeatCount="indefinite"><mpath href="#p-c5"/></animateMotion></circle>

  <!-- ================= 5. Finding category chips ================= -->
  <g>
    <rect x="900" y="40" width="180" height="60" rx="8" fill="#1a1d2e" stroke="#74b9ff" stroke-width="1.5"/>
    <rect x="900" y="40" width="6" height="60" fill="#74b9ff"/>
    <text x="918" y="66" fill="#e8eaf0" font-size="12.5" font-weight="700">Public S3 Buckets</text>
    <text x="918" y="82" fill="#6b7194" font-size="10">inventory_resources</text>

    <rect x="900" y="155" width="180" height="60" rx="8" fill="#1a1d2e" stroke="#fdcb6e" stroke-width="1.5"/>
    <rect x="900" y="155" width="6" height="60" fill="#fdcb6e"/>
    <text x="918" y="181" fill="#e8eaf0" font-size="12.5" font-weight="700">Open Security Groups</text>
    <text x="918" y="197" fill="#6b7194" font-size="10">inventory_resources</text>

    <rect x="900" y="270" width="180" height="60" rx="8" fill="#1a1d2e" stroke="#a29bfe" stroke-width="1.5"/>
    <rect x="900" y="270" width="6" height="60" fill="#a29bfe"/>
    <text x="918" y="296" fill="#e8eaf0" font-size="12.5" font-weight="700">Unencrypted EBS</text>
    <text x="918" y="312" fill="#6b7194" font-size="10">inventory_resources</text>

    <rect x="900" y="385" width="180" height="60" rx="8" fill="#1a1d2e" stroke="#e17055" stroke-width="1.5"/>
    <rect x="900" y="385" width="6" height="60" fill="#e17055"/>
    <text x="918" y="411" fill="#e8eaf0" font-size="12.5" font-weight="700">IAM Users w/o MFA</text>
    <text x="918" y="427" fill="#6b7194" font-size="10">inventory_resources</text>

    <rect x="900" y="500" width="180" height="60" rx="8" fill="#1a1d2e" stroke="#6b7194" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="900" y="500" width="6" height="60" fill="#6b7194"/>
    <text x="918" y="526" fill="#e8eaf0" font-size="12.5" font-weight="700">Container CVEs (ECR)</text>
    <text x="918" y="542" fill="#6b7194" font-size="10">secondary SDK path</text>
  </g>

  <!-- chips -> dashboard -->
  <path id="p-d1" d="M1080,70 H1000 V300 H1018" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-d2" d="M1080,185 H1000 V300 H1018" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-d3" d="M1080,300 H1018" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-d4" d="M1080,415 H1000 V300 H1018" fill="none" stroke="#2d3250" stroke-width="2" marker-end="url(#arrow)"/>
  <path id="p-d5" d="M1080,530 H1000 V300 H1018" fill="none" stroke="#6b7194" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>

  <circle r="4.5" fill="#74b9ff"><animateMotion dur="1.8s" begin="0.2s" repeatCount="indefinite"><mpath href="#p-d1"/></animateMotion></circle>
  <circle r="4.5" fill="#fdcb6e"><animateMotion dur="1.8s" begin="0.5s" repeatCount="indefinite"><mpath href="#p-d2"/></animateMotion></circle>
  <circle r="4.5" fill="#a29bfe"><animateMotion dur="1.8s" begin="0.8s" repeatCount="indefinite"><mpath href="#p-d3"/></animateMotion></circle>
  <circle r="4.5" fill="#e17055"><animateMotion dur="1.8s" begin="1.1s" repeatCount="indefinite"><mpath href="#p-d4"/></animateMotion></circle>
  <circle r="4" fill="#9ba1b8"><animateMotion dur="2s" begin="0.4s" repeatCount="indefinite"><mpath href="#p-d5"/></animateMotion></circle>

  <!-- ================= 6. Security dashboard ================= -->
  <rect x="1020" y="230" width="150" height="140" rx="10" fill="#1a1d2e" stroke="#e8eaf0" stroke-width="1.2"/>
  <g transform="translate(1095,285)">
    <circle r="42" fill="none" stroke="#232740" stroke-width="0"/>
    <circle r="42" fill="none">
      <animate attributeName="opacity" values=".4;.9;.4" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="34" fill="none" stroke="#2d3250" stroke-width="12"/>
    <circle r="34" fill="none" stroke="#e17055" stroke-width="12" stroke-dasharray="55 300" stroke-dashoffset="0" transform="rotate(-90)"/>
    <circle r="34" fill="none" stroke="#fdcb6e" stroke-width="12" stroke-dasharray="75 300" stroke-dashoffset="-55" transform="rotate(-90)"/>
    <circle r="34" fill="none" stroke="#74b9ff" stroke-width="12" stroke-dasharray="83 300" stroke-dashoffset="-130" transform="rotate(-90)"/>
  </g>
  <text x="1095" y="350" fill="#e8eaf0" font-size="12.5" font-weight="700" text-anchor="middle">Security Dashboard</text>
  <text x="1095" y="365" fill="#6b7194" font-size="10" text-anchor="middle">findings by severity</text>
</svg>
